<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sakthi Engineering College</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#8B0000,#C62828);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    max-width:90%;
    background:#fff;
    border-radius:15px;
    padding:35px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.logo{
    width:130px;
    margin-bottom:15px;
}

h2{
    color:#8B0000;
    margin-bottom:20px;
}

input,
textarea{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
    transition:0.3s;
}

input:focus,
textarea:focus{
    border-color:#8B0000;
    box-shadow:0 0 5px rgba(139,0,0,.3);
}

textarea{
    resize:none;
    height:120px;
}

button{
    width:100%;
    padding:14px;
    background:#8B0000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#A00000;
}

.footer{
    margin-top:18px;
    color:#666;
    font-size:13px;
    line-height:20px;
}

@media(max-width:480px){
    .container{
        width:95%;
        padding:25px;
    }

    .logo{
        width:110px;
    }

    h2{
        font-size:22px;
    }
}
</style>

</head>

<body>

<div class="container">

    <!-- College Logo -->
    <img src="images-removebg-preview.png" alt="Adhiparasakthi Engineering College Logo" class="logo">

    <h2>Student Enquiry Form</h2>

    <form action="https://forminit.com/f/uaxespqp7qo" method="POST">

        <input
            type="text"
            name="student_name"
            placeholder="Student Name"
            autocomplete="name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Student Email"
            autocomplete="email"
            required>

        <textarea
            name="message"
            placeholder="Enter your message"
            required></textarea>

        <button type="submit">Submit</button>

    </form>

    <div class="footer">
        <strong>Sakthi Engineering College</strong><br>
        Study | Spirituality | Service
    </div>

</div>

</body>
</html>
