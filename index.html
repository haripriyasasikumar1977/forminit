<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College - Student Form</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#7a0000,#d50000);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.container{
width:420px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 15px 30px rgba(0,0,0,.4);
text-align:center;
}

.logo{
width:140px;
margin-bottom:10px;
}

h2{
color:#8B0000;
margin-bottom:5px;
}

h4{
color:#555;
margin-bottom:20px;
font-weight:normal;
}

.input-box{
margin-bottom:15px;
text-align:left;
}

.input-box label{
display:block;
font-weight:bold;
margin-bottom:6px;
color:#444;
}

.input-box input,
.input-box select,
.input-box textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:15px;
outline:none;
transition:.3s;
}

.input-box input:focus,
.input-box select:focus,
.input-box textarea:focus{
border-color:#b71c1c;
box-shadow:0 0 5px rgba(183,28,28,.4);
}

textarea{
resize:none;
height:80px;
}

button{
width:100%;
padding:13px;
background:#b71c1c;
border:none;
color:#fff;
font-size:18px;
font-weight:bold;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#7a0000;
}

.footer{
margin-top:15px;
font-size:13px;
color:#666;
}

.success{
display:none;
color:green;
font-weight:bold;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<img src="images-removebg-preview.png" class="logo">

<h2>Adhiparasakthi Engineering College</h2>
<h4>Student Form Submission</h4>

<form id="studentForm">

<input type="hidden"
name="access_key"
value="e760c71f-11f7-4964-99ff-eac4fffa4fad">

<div class="input-box">
<label>Student Name</label>
<input
type="text"
name="Student Name"
required>
</div>

<div class="input-box">
<label>Register Number</label>
<input
type="text"
name="Register Number"
required>
</div>

<div class="input-box">
<label>Email</label>
<input
type="email"
name="Email"
required>
</div>

<div class="input-box">
<label>Phone Number</label>
<input
type="tel"
name="Phone Number"
pattern="[0-9]{10}"
required>
</div>

<div class="input-box">
<label>Department</label>

<select name="Department" required>

<option value="">Select Department</option>

<option>CSE</option>

<option>AI & DS</option>

<option>IT</option>

<option>ECE</option>

<option>EEE</option>

<option>MECH</option>

<option>CIVIL</option>

<option>MBA</option>

</select>

</div>

<div class="input-box">

<label>Year</label>

<select name="Year" required>

<option value="">Select Year</option>

<option>I Year</option>

<option>II Year</option>

<option>III Year</option>

<option>IV Year</option>

</select>

</div>

<div class="input-box">

<label>Message</label>

<textarea
name="Message"
placeholder="Enter your message"></textarea>

</div>

<button type="submit">
Submit Form
</button>

<div class="success" id="result"></div>

</form>

<div class="footer">
© Sakthi Engineering College
</div>

</div>

<script>

const form=document.getElementById("studentForm");
const result=document.getElementById("result");

form.addEventListener("submit",async function(e){

e.preventDefault();

const formData=new FormData(form);

const response=await fetch("https://api.web3forms.com/submit",{

method:"POST",

body:formData

});

const data=await response.json();

if(data.success){

result.style.display="block";

result.innerHTML="✅ Form Submitted Successfully.";

form.reset();

}else{

result.style.display="block";

result.style.color="red";

result.innerHTML="❌ Submission Failed.";

}

});

</script>

</body>
</html>
