<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sakthi Engineering College</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#8B0000,#C62828);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:380px;
    background:#fff;
    border-radius:15px;
    padding:35px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.logo{
    width:140px;
    margin-bottom:15px;
}

h2{
    color:#8B0000;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

textarea{
    resize:none;
    height:100px;
}

button{
    width:100%;
    padding:14px;
    background:#8B0000;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#A00000;
}

.footer{
    margin-top:18px;
    color:#666;
    font-size:13px;
}
</style>

</head>
<body>

<div class="container">

<img src="images-removebg-preview.png" class="logo" alt="College Logo">

<h2>Student Enquiry Form</h2>

<form action="https://forminit.com/f/uaxespqp7qo" method="POST">

<input
type="text"
name="student_name"
placeholder="Student Name"
required>

<input
type="email"
name="email"
placeholder="Student Email"
required>

<textarea
name="message"
placeholder="Enter your message"
required></textarea>

<button type="submit">
Submit
</button>

</form>

<div class="footer">
Sakthi Engineering College<br>
Study | Spirituality | Service
</div>

</div>

</body>
</html>
